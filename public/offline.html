<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - SQL Analyst Academy</title>
  <style>
    body { background: #06090c; color: #f0f4f8; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
    .card { background: #10141a; border: 1px solid #1f2630; border-radius: 12px; padding: 32px; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    h1 { color: #38d9ff; font-size: 20px; margin-bottom: 12px; }
    p { color: #94a3b8; font-size: 13px; line-height: 1.6; margin-bottom: 20px; }
    button { background: #38d9ff; color: #040d12; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Offline Mode Pending</h1>
    <p>You are currently offline. Please connect to the internet once to complete initial offline caching.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
